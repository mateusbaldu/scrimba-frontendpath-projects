<html>
    <head>
        <link rel="stylesheet" href="index.css">
        <link href="https://fonts.cdnfonts.com/css/cursed-timer-ulil" rel="stylesheet">
    </head>
    <body>
        <div class="container">
            <div>
                <h3 class="title">HOME</h3>
                <p id="home-counter">0</p>
                <div class="home-counter-buttons">
                    <button class="plus-one-btn" onclick="plusOne()">+1</button>
                    <button class="plus-two-btn" onclick="plusTwo()">+2</button>
                    <button class="plus-three-btn" onclick="plusThree()">+3</button>
                </div>
            </div>
            <div>
                <h3 class="title">GUEST</h3>
                <p id="guest-counter">0</p>
                <div class="guest-counter-buttons">
                    <button class="plus-one-btn" onclick="plusOne()">+1</button>
                    <button class="plus-two-btn" onclick="plusTwo()">+2</button>
                    <button class="plus-three-btn" onclick="plusThree()">+3</button>
                </div>
            </div>
        </div>
        <button id="reset-game-btn" onclick="resetGame()">Reset Game</button>
        <script src="index.js"></script>
    </body>
</html>
